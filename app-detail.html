  <script src="assets/js/main.js"></script>
  <script>
    let currentAppInfo = null;
    let urlParams = null;

    document.addEventListener('appReady', () => {
      urlParams = new URLSearchParams(window.location.search);
      loadAppDetails();
    });

    document.addEventListener('languageChanged', () => {
      if (currentAppInfo) {
        renderDetails(currentAppInfo, urlParams.get('app'), urlParams.get('type'));
      }
    });

    async function loadAppDetails() {
      const appType = urlParams.get('type');
      const appName = urlParams.get('app');
      const contentArea = document.getElementById('content-area');

      if (!appName || !appType) {
        contentArea.innerHTML = `<div style="text-align: center; padding: 4rem;"><h2>EUNG SOFT Apps</h2><p>애플리케이션 목록에서 관심있는 앱을 선택해주세요.</p><a href="/" class="btn" style="margin-top: 2rem;">홈으로 돌아가기</a></div>`;
        return;
      }

      const jsonUrl = `download/${appType}/${appName}/info.json`;

      try {
        currentAppInfo = await window.fetchJSON(jsonUrl);
        if (!currentAppInfo) throw new Error("Could not load info.json");

        renderDetails(currentAppInfo, appName, appType);
      } catch (err) {
        contentArea.innerHTML = `<h2 style="text-align: center;">App Not Found</h2>`;
      }
    }

    function renderDetails(info, appName, appType) {
      const lang = window.getLang();
      const contentArea = document.getElementById('content-area');

      const title = info.title[lang] || info.title['ko'];
      const desc = info.description[lang] || info.description['ko'];
      const control = info.control[lang] || info.control['ko'];
      const tags = info.tags[lang] || info.tags['ko'] || [];
      const backUrl = appType.toLowerCase() === 'android' ? 'android/' : 'rokid/';

      // Create tags HTML
      let tagsHtml = '';
      tags.forEach(tag => {
        tagsHtml += `<span class="tag">#${tag}</span>`;
      });

      // Video or Representative Image HTML
      let videoHtml = '';
      const representativeImg = (info.images && info.images.length > 0)
        ? (info.images[0].startsWith('http') ? info.images[0] : `download/${appType}/${appName}/${info.images[0]}`)
        : `https://placehold.co/450x800/f0f0f0/666666?text=${appName}`;

      if (info.youtubeUrl) {
        const isVertical = info.youtubeType === "1";
        const videoStyle = isVertical
          ? 'aspect-ratio: 9/16; max-width: 450px;'
          : 'aspect-ratio: 16/9; max-width: 100%;';

        videoHtml = `
          <div class="video-container fade-elem" style="${videoStyle}">
            <iframe src="${info.youtubeUrl}" allowfullscreen></iframe>
          </div>
        `;
      } else {
        videoHtml = `
          <div style="border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; background: #e5e7eb; aspect-ratio: 9/16;" class="fade-elem">
             <img src="${representativeImg}" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        `;
      }

      // Gallery Images HTML
      let galleryHtml = '';
      if (info.images && info.images.length > 0) {
        galleryHtml = '<div style="display: flex; gap: 0.5rem; flex-wrap: wrap;" class="fade-elem">';
        info.images.forEach(imgName => {
          const imgSrc = imgName.startsWith('http') ? imgName : `download/${appType}/${appName}/${imgName}`;
          galleryHtml += `
            <img src="${imgSrc}" 
                 style="width: 32%; aspect-ratio: 9/16; border-radius: 8px; object-fit: cover; cursor: pointer;"
                 onclick="window.open(this.src, '_blank')">
          `;
        });
        galleryHtml += '</div>';
      }



      const html = `
        <!-- Title & Back Button -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;" class="fade-elem">
          <a href="${backUrl}" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-weight: 500;">
            <span class="material-symbols-rounded">arrow_back</span>
            Back to List
          </a>
        </div>
        
        <div class="detail-grid">
          <!-- Left Col (Media) -->
          <div>
            ${videoHtml}
            ${galleryHtml}
          </div>
          
          <!-- Right Col (Info) -->
          <div class="card fade-elem" style="border: none; box-shadow: none; background: transparent; padding: 0;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem;">
              ${title}
            </h1>
            
            <!-- Metadata -->
            <div style="display: flex; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
               <span style="display: flex; align-items: center; gap: 0.3rem;"><span class="material-symbols-rounded" style="font-size:1.2rem;">new_releases</span> v${info.version}</span>
               <span style="display: flex; align-items: center; gap: 0.3rem;"><span class="material-symbols-rounded" style="font-size:1.2rem;">event</span> ${info.releaseDate}</span>
               
               <button onclick="copyToClipboard(this)" 
                       style="background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; padding: 4px; border-radius: 4px; transition: background 0.2s;" 
                       title="Copy URL" 
                       onmouseover="this.style.background='var(--border-color)';" 
                       onmouseout="this.style.background='none';">
                 <span class="material-symbols-rounded" style="font-size:1.2rem;">content_copy</span>
               </button>

               <span id="download-count-container" style="display: flex; align-items: center; gap: 0.3rem; color: var(--text-muted); font-size: 0.95rem;">
                 <span class="material-symbols-rounded" style="font-size:1.2rem;">download</span>
                 <span id="download-count-value">...</span>
               </span>
            </div>


            
            <div style="margin-bottom: 1.5rem;">${tagsHtml}</div>
            
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Description</h3>
            <div style="white-space: pre-line; margin-bottom: 2rem; color: var(--text-muted); line-height: 1.8;">${desc}</div>
            
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Control</h3>
            <div style="white-space: pre-line; margin-bottom: 2rem; color: var(--text-muted); line-height: 1.8;">${control}</div>

            <!-- Updated Section -->
            ${info.updated && Array.isArray(info.updated) && info.updated.length > 0 ? `
              <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">What's New</h3>
              <div style="margin-bottom: 2rem; color: var(--text-muted); line-height: 1.8;">
                ${info.updated.map(item => `
                  <div style="margin-bottom: 1rem; padding: 1rem; background: var(--border-color); border-radius: 8px; opacity: 0.9;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                       <strong style="color: var(--primary-color);">v${item.version}</strong>
                       <small style="font-size: 0.85rem; opacity: 0.8;">${item.releaseDate}</small>
                    </div>
                    <div style="white-space: pre-line; margin: 0; font-size: 0.95rem;">${item[lang] || item['ko']}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}

            <!-- Download Buttons -->
            <div style="display: flex; flex-direction: column; gap: 0.8rem;">
              ${(() => {
          const downloadList = Array.isArray(info.download) ? info.download : (info.download ? [info.download] : []);
          const isStoreLink = info.storeUrl && info.storeUrl.trim() !== "";

          return downloadList.map((dlUrl, index) => {
            const dlTarget = isStoreLink || dlUrl.startsWith('http') ? 'target="_blank"' : '';
            const dlAttr = isStoreLink ? '' : 'download';

            let filename = dlUrl.substring(dlUrl.lastIndexOf('/') + 1);
            if (!filename || filename === dlUrl) filename = 'Download';

            const dlText = index === 0
              ? (isStoreLink ? (lang === 'ko' ? '스토어에서 다운로드' : 'Download from Store') : `${window.t('btn.download')} ${filename}`)
              : `${filename} (Old Version)`;

            const dlIcon = index === 0 ? (isStoreLink ? 'open_in_new' : 'download') : 'history';

            if (index === 0) {
              return `
                      <a href="${dlUrl}" ${dlTarget} ${dlAttr} onclick="incDownloadCount('${appName}'); if(window.gtag) { gtag('event', 'app_download', {'app_name': '${appName}', 'version': 'latest'}); }" class="btn dl-btn" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                        <span class="material-symbols-rounded">${dlIcon}</span>
                        ${dlText}
                      </a>
                    `;
            } else {
              return `
                      <a href="${dlUrl}" ${dlTarget} ${dlAttr} onclick="incDownloadCount('${appName}'); if(window.gtag) { gtag('event', 'app_download', {'app_name': '${appName}', 'version': 'old'}); }" class="btn" style="width: 100%; padding: 0.7rem; font-size: 0.9rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); justify-content: center; gap: 0.5rem;">
                        <span class="material-symbols-rounded" style="font-size: 1.2rem;">${dlIcon}</span>
                        ${dlText}
                      </a>
                    `;
            }
          }).join('');
        })()}
            </div>
          </div>
        </div>
      `;

      contentArea.innerHTML = html;
      document.title = `${title} - EUNG SOFT`;

      // Fetch and display download count
      getDownloadCount(appName);

      // Animations
      if (window.gsap) {
        gsap.fromTo('.fade-elem',
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.6, stagger: 0.1, ease: "power2.out" }
        );

        // Bouncy hover for download
        const dlBtn = document.querySelector('.dl-btn');
        if (dlBtn) {
          dlBtn.addEventListener('mouseenter', () => gsap.to(dlBtn, { scale: 1.03, duration: 0.3, ease: "back.out(2)" }));
          dlBtn.addEventListener('mouseleave', () => gsap.to(dlBtn, { scale: 1, duration: 0.3, ease: "power2.out" }));
        }
      }
    }
    function copyToClipboard(btn) {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const icon = btn.querySelector('.material-symbols-rounded');
        const originalIcon = icon.textContent;
        icon.textContent = 'check';
        btn.style.color = '#10b981';

        setTimeout(() => {
          icon.textContent = originalIcon;
          btn.style.color = 'var(--text-muted)';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }

    async function getDownloadCount(keyword) {
      console.log('Fetching download count for:', keyword);
      const countEl = document.getElementById('download-count-value');
      if (!countEl) return;

      try {
        // Netlify 프록시 주소 사용 (/proxy-count/ -> http://m.73s.woobi.co.kr/)
        const response = await fetch(`/proxy-count/count.php?keyword=${encodeURIComponent(keyword)}&t=${new Date().getTime()}`);
        if (response.ok) {
          const text = await response.text();
          // 결과에 JSONP 함수명이 섞여있을 수 있으므로 숫자만 추출
          const count = text.match(/\d+/) ? text.match(/\d+/)[0] : '0';
          countEl.textContent = count;
        } else {
          countEl.textContent = '0';
        }
      } catch (err) {
        console.error('Failed to fetch download count via proxy:', err);
        countEl.textContent = '0';
      }
    }

    async function incDownloadCount(keyword) {
      console.log('Incrementing download count for:', keyword);
      try {
        // Increment도 프록시 사용
        fetch(`/proxy-count/count.php?keyword=${encodeURIComponent(keyword)}&mode=inc&t=${new Date().getTime()}`);
      } catch (err) {
        console.error('Failed to increment download count:', err);
      }
    }
  </script>
</body>

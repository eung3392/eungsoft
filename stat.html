<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통계 대시보드 - EUNG SOFT</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --accent-color: #3b82f6;
      --radius: 16px;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', -apple-system, sans-serif;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    td {
      font-size: 1rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .count-badge {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-color);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-weight: 600;
      font-family: monospace;
      font-size: 1.1rem;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      color: var(--text-muted);
    }

    .material-symbols-rounded.spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>
        <span class="material-symbols-rounded" style="color: var(--accent-color); font-size: 2.2rem;">monitoring</span>
        Keyword Statistics
      </h1>
      <div class="subtitle">EUNG SOFT 다운로드 및 이벤트 통계 대시보드</div>
    </header>

    <div id="loader" class="loading">
      <span class="material-symbols-rounded spin" style="font-size: 3rem;">autorenew</span>
    </div>

    <div id="dashboard" class="dashboard-grid" style="display: none;">
      <!-- Chart Area -->
      <div class="card">
        <h2>
          <span class="material-symbols-rounded">bar_chart</span>
          Distribution Analysis
        </h2>
        <canvas id="statsChart"></canvas>
      </div>

      <!-- Table Area -->
      <div class="card">
        <h2>
          <span class="material-symbols-rounded">table_rows</span>
          Keyword Details
        </h2>
        <table>
          <thead>
            <tr>
              <th>이름 (Keyword)</th>
              <th style="text-align: right;">누적 횟수</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data will be inserted here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/track-stats?action=all');
        const result = await response.json();

        if (result.success) {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('dashboard').style.display = 'grid';
          renderDashboard(result.data);
        } else {
          showError('데이터를 불러오는데 실패했습니다: ' + result.error);
        }
      } catch (err) {
        showError('네트워크 오류가 발생했습니다.');
        console.error(err);
      }
    });

    function showError(msg) {
      const loader = document.getElementById('loader');
      loader.innerHTML = `<span style="color: #ef4444; display:flex; align-items:center; gap:0.5rem;"><span class="material-symbols-rounded">error</span> ${msg}</span>`;
    }

    function renderDashboard(data) {
      const tbody = document.getElementById('table-body');
      const labels = [];
      const counts = [];
      const bgColors = [];

      // Generate Colors
      const colors = [
        'rgba(59, 130, 246, 0.8)', // blue
        'rgba(16, 185, 129, 0.8)', // green
        'rgba(245, 158, 11, 0.8)', // yellow
        'rgba(239, 68, 68, 0.8)',  // red
        'rgba(168, 85, 247, 0.8)', // purple
        'rgba(14, 165, 233, 0.8)', // sky
        'rgba(236, 72, 153, 0.8)', // pink
      ];

      data.forEach((item, index) => {
        // Prepare arrays for Chart.js
        labels.push(item.event_name);
        counts.push(item.count);
        bgColors.push(colors[index % colors.length]);

        // Create Table Row
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.event_name}</td>
          <td style="text-align: right;"><span class="count-badge">${item.count}</span></td>
        `;
        tbody.appendChild(tr);
      });

      // Render Chart
      const ctx = document.getElementById('statsChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '다운로드/이벤트 수',
            data: counts,
            backgroundColor: bgColors,
            borderColor: bgColors.map(c => c.replace('0.8', '1')),
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255, 255, 255, 0.1)' },
              ticks: { color: '#94a3b8' }
            },
            x: {
              grid: { display: false },
              ticks: { color: '#94a3b8' }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
